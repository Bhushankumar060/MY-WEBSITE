<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vault | Sovereign Asset Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#10b981', dark: '#020617', surface: '#0f172a', border: '#1e293b' },
                    fontFamily: { sans: ['Space Grotesk', 'sans-serif'], heading: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: 'Space Grotesk', sans-serif; }
        .glass-vault { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .asset-card:hover { transform: scale(1.02); border-color: #10b981; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="h-20 border-b border-white/5 glass-vault fixed w-full z-50 px-8 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-primary/20 rounded-xl flex items-center justify-center border border-primary/30">
                <i class="fa-solid fa-vault text-primary"></i>
            </div>
            <h1 class="text-xl font-black font-heading tracking-tighter uppercase">My <span class="text-primary italic">Vault</span></h1>
        </div>
        <nav class="flex items-center gap-8 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">
             <a href="student-dashboard.html" class="hover:text-white transition-all">Learning</a>
             <a href="trader-dashboard.html" class="hover:text-white transition-all">Trading</a>
             <a href="store.html" class="hover:text-white transition-all">Store</a>
             <div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center text-xs text-dark" id="user-initial">?</div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-grow pt-32 pb-20 px-8 max-w-7xl mx-auto w-full">
        
        <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-12">
            <div>
                <h2 class="text-4xl font-black font-heading uppercase text-white tracking-tighter">Your Unlocked <span class="text-primary">Intelligence</span></h2>
                <p class="text-slate-500 font-bold text-sm mt-2 uppercase tracking-widest">Sovereign Asset Library // Tier-3 Access</p>
            </div>
            <div class="flex gap-4">
                <button class="px-6 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-white transition-all">Filter: All</button>
                <button class="px-6 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-white transition-all">Sort: Recent</button>
            </div>
        </div>

        <!-- Asset Grid -->
        <div id="purchases-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Dynamic Assets Loaded from Supabase -->
            <div class="animate-pulse glass-vault p-8 rounded-3xl h-64 border border-white/5"></div>
            <div class="animate-pulse glass-vault p-8 rounded-3xl h-64 border border-white/5"></div>
            <div class="animate-pulse glass-vault p-8 rounded-3xl h-64 border border-white/5"></div>
        </div>

        <!-- Empty State (Hidden) -->
        <div id="empty-vault" class="hidden flex flex-col items-center justify-center py-20 text-center space-y-6">
            <div class="w-24 h-24 bg-white/5 rounded-full flex items-center justify-center text-slate-600">
                <i class="fa-solid fa-box-open text-4xl"></i>
            </div>
            <h3 class="text-2xl font-black uppercase text-slate-400">The Vault is Silent</h3>
            <p class="text-slate-500 font-medium max-w-xs">Acquire premium strategies or curriculum packs from the Sovereign Store to unlock intelligence.</p>
            <a href="store.html" class="px-10 py-4 bg-primary text-dark font-black uppercase tracking-widest rounded-2xl hover:bg-emerald-400 transition-all">Go to Store</a>
        </div>

    </main>

    <!-- JS Logic -->
    <script type="module">
        import { auth, onAuthStateChanged } from './js/firebase-config.js';
        
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('user-initial').innerText = user.email[0].toUpperCase();
                loadPurchases(user.email);
            } else {
                window.location.href = '/index.html';
            }
        });

        async function loadPurchases(email) {
            // Mocking Supabase Fetch for v9.0 placeholder logic
            const grid = document.getElementById('purchases-grid');
            
            // Simulation
            setTimeout(() => {
                grid.innerHTML = `
                    <div class="asset-card glass-vault p-8 rounded-3xl border border-white/5 transition-all group relative overflow-hidden">
                        <div class="absolute -right-4 -bottom-4 text-primary/10 text-8xl group-hover:scale-110 transition-transform"><i class="fa-solid fa-file-pdf"></i></div>
                        <div class="flex justify-between items-start mb-6">
                            <span class="px-3 py-1 bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 rounded-full text-[9px] font-black uppercase tracking-widest">Strategy_Pack</span>
                            <span class="text-slate-500 text-[9px] font-bold">2026_EDITION</span>
                        </div>
                        <h3 class="text-xl font-black text-white uppercase mb-2 group-hover:text-primary transition-colors">Order Flow Dominance</h3>
                        <p class="text-slate-500 text-xs font-medium mb-8">Comprehensive guide to institutional liquidity capturing logic.</p>
                        <button class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-300 hover:bg-white/10 hover:text-white transition-all flex items-center justify-center gap-2">
                            <i class="fa-solid fa-download"></i> Download_PDF
                        </button>
                    </div>

                    <div class="asset-card glass-vault p-8 rounded-3xl border border-white/5 transition-all group relative overflow-hidden">
                        <div class="absolute -right-4 -bottom-4 text-primary/10 text-8xl group-hover:scale-110 transition-transform"><i class="fa-solid fa-video"></i></div>
                        <div class="flex justify-between items-start mb-6">
                            <span class="px-3 py-1 bg-indigo-500/10 text-indigo-500 border border-indigo-500/20 rounded-full text-[9px] font-black uppercase tracking-widest">Masterclass</span>
                            <span class="text-slate-500 text-[9px] font-bold">LIFETIME</span>
                        </div>
                        <h3 class="text-xl font-black text-white uppercase mb-2 group-hover:text-primary transition-colors">Class 12 - Physics Pro</h3>
                        <p class="text-slate-500 text-xs font-medium mb-8">Access to all chapters and interactive AI tutoring sessions.</p>
                        <a href="student-dashboard.html" class="w-full py-4 bg-primary text-dark rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-400 transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/20">
                            <i class="fa-solid fa-play"></i> Start_Learning
                        </a>
                    </div>
                `;
            }, 1000);
        }
    </script>
</body>
</html>
