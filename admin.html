<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Admin | Executive Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#10b981', dark: '#020617', surface: '#0f172a' },
                    fontFamily: { sans: ['Space Grotesk', 'sans-serif'], heading: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Space Grotesk', sans-serif; height: 100vh; overflow: hidden; }
        .sidebar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-item { transition: all 0.2s; border-radius: 12px; margin-bottom: 4px; border: 1px solid transparent; }
        .nav-item:hover { background: rgba(16, 185, 129, 0.05); border-color: rgba(16, 185, 129, 0.1); }
        .nav-item.active { background: #10b981; color: #020617; font-weight: 800; box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        .card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); border-color: rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="flex">

    <!-- Sidebar -->
    <aside class="w-72 sidebar flex flex-col p-6">
        <div class="mb-10 flex items-center gap-3 px-2">
            <i class="fa-solid fa-crown text-primary text-2xl"></i>
            <h1 class="text-xl font-black font-heading tracking-tighter uppercase">Command <span class="text-primary opacity-50">Center</span></h1>
        </div>

        <nav class="flex-grow space-y-1 overflow-y-auto">
            <p class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-4 px-2">Core_Systems</p>
            <button onclick="showTab('dashboard')" class="w-full flex items-center gap-4 p-4 nav-item active" id="btn-dashboard">
                <i class="fa-solid fa-house-chimney w-5"></i> Dashboard
            </button>
            <button onclick="showTab('content')" class="w-full flex items-center gap-4 p-4 nav-item" id="btn-content">
                <i class="fa-solid fa-folder-open w-5"></i> Content
            </button>
            <button onclick="showTab('store')" class="w-full flex items-center gap-4 p-4 nav-item" id="btn-store">
                <i class="fa-solid fa-shop w-5"></i> Store_Mgr
            </button>
            <button onclick="showTab('api')" class="w-full flex items-center gap-4 p-4 nav-item" id="btn-api">
                <i class="fa-solid fa-key w-5"></i> API_Matrix
            </button>
            
            <p class="text-[10px] font-black uppercase tracking-widest text-slate-500 mt-10 mb-4 px-2">Monitoring</p>
            <button onclick="showTab('monitoring')" class="w-full flex items-center gap-4 p-4 nav-item" id="btn-monitoring">
                <i class="fa-solid fa-microchip w-5"></i> Performance
            </button>
            <button onclick="showTab('security')" class="w-full flex items-center gap-4 p-4 nav-item" id="btn-security">
                <i class="fa-solid fa-shield-halved w-5"></i> Security
            </button>
        </nav>

        <div class="mt-auto pt-6 border-t border-white/5">
            <button onclick="handleLogout()" class="w-full flex items-center gap-4 p-4 text-slate-400 hover:text-red-400 transition-colors text-xs font-black uppercase tracking-widest">
                <i class="fa-solid fa-power-off"></i> Terminate_Session
            </button>
        </div>
    </aside>

    <!-- Main Viewport -->
    <main class="flex-grow flex flex-col overflow-y-auto">
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-10">
            <h2 id="tab-title" class="text-xs font-black uppercase tracking-[0.4em] text-slate-400">System_Overview</h2>
            <div class="flex items-center gap-4">
                <span class="w-2 h-2 bg-primary rounded-full animate-pulse"></span>
                <span class="text-[10px] font-black uppercase text-primary">Production_Live</span>
            </div>
        </header>

        <div id="tab-container" class="p-10 space-y-8">
            <!-- Dynamic Content Injected Here -->
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <script>
        const TABS = {
            dashboard: `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="card p-8 space-y-4">
                        <p class="text-[10px] uppercase font-black tracking-widest text-slate-500">Total_Users</p>
                        <p class="text-4xl font-heading font-black">1.2k</p>
                        <div class="h-1 bg-primary/20 rounded-full"><div class="w-2/3 h-full bg-primary rounded-full shadow-[0_0_10px_#10b981]"></div></div>
                    </div>
                    <div class="card p-8 space-y-4">
                        <p class="text-[10px] uppercase font-black tracking-widest text-slate-500">Revenue_Monthly</p>
                        <p class="text-4xl font-heading font-black">₹4.2L</p>
                        <p class="text-xs text-green font-bold">+12% from last week</p>
                    </div>
                </div>
            `,
            api: `
                <div class="max-w-4xl space-y-8">
                    <h3 class="text-2xl font-black uppercase tracking-tighter">Global API Matrix</h3>
                    <div class="grid gap-6">
                        <div class="p-6 bg-white/5 rounded-2xl border border-white/10 space-y-4">
                            <label class="text-[10px] font-black uppercase text-slate-500">OpenRouter_API_Key</label>
                            <div class="flex gap-4">
                                <input type="password" value="sk-or-v1-****************" class="flex-grow bg-dark border border-white/10 p-4 rounded-xl text-xs font-mono" readonly>
                                <button class="px-6 bg-primary text-dark font-black text-[10px] uppercase rounded-xl">Update</button>
                            </div>
                        </div>
                    </div>
                </div>
            `
        };

        function showTab(tabId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-' + tabId).classList.add('active');
            
            const container = document.getElementById('tab-container');
            container.innerHTML = TABS[tabId] || `<div class="p-10 text-center opacity-30 uppercase font-black text-xs tracking-widest">Section under reconstruction...</div>`;
            document.getElementById('tab-title').innerText = tabId.toUpperCase() + '_MODULE';
        }

        function handleLogout() {
            firebase.auth().signOut().then(() => window.location.href = 'admin/login.html');
        }

        document.addEventListener('DOMContentLoaded', () => {
            firebase.auth().onAuthStateChanged(user => {
                if (!user) window.location.href = 'admin/login.html';
                else showTab('dashboard');
            });
        });
    </script>
</body>
</html>
