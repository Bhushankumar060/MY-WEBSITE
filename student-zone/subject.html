<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Overview | TradeSovereign Student Zone</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' },
                        dark: { bg: '#0f172a', surface: '#1e293b', border: '#334155' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-dark-bg dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col">

    <!-- Header Navigation -->
    <header class="fixed w-full z-50 glass-panel shadow-sm transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center">
                    <a href="../index.html" class="text-2xl font-extrabold text-brand-600 dark:text-brand-500 tracking-tight flex items-center gap-2">
                        <i class="fa-solid fa-crown"></i> TradeSovereign
                    </a>
                </div>
                <nav class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="font-medium text-brand-600 dark:text-brand-400">Student Zone</a>
                    <a href="../trading-zone/index.html" class="font-medium text-gray-600 hover:text-brand-600 dark:text-gray-300 dark:hover:text-white transition-colors">Trading Zone</a>
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors focus:outline-none">
                        <i id="theme-icon" class="fa-solid fa-moon text-gray-600 dark:text-gray-300 text-lg"></i>
                    </button>
                    <a href="#" id="back-btn" class="px-5 py-2.5 rounded-full border border-gray-300 dark:border-gray-600 font-medium hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">Go Back</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="flex-grow pt-28 pb-20">
        <!-- Hero -->
        <section class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center mb-12">
            <div class="inline-block p-4 rounded-full bg-brand-100 text-brand-600 dark:bg-brand-900/50 dark:text-brand-400 mb-4">
                <i class="fa-solid fa-bookmark text-3xl"></i>
            </div>
            <h1 id="subject-title" class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-gray-900 dark:text-white">Subject Overview</h1>
            <p class="text-xl text-gray-600 dark:text-gray-300 max-w-2xl mx-auto">Select a chapter below to access detailed notes, video explanations, quizzes and solutions.</p>
        </section>

        <!-- Chapter List -->
        <section class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between mb-6 border-b border-gray-200 dark:border-gray-700 pb-4">
                <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-200">Chapters</h2>
                <span class="text-sm font-medium text-brand-600 dark:text-brand-400 bg-brand-50 dark:bg-brand-900/40 px-3 py-1 rounded-full" id="chapter-count">0 Chapters</span>
            </div>
            <div id="chapter-list" class="space-y-4">
                <!-- Dynamically injected -->
            </div>
        </section>
    </main>

    <footer class="bg-white dark:bg-dark-surface border-t border-gray-200 dark:border-dark-border py-8 mt-auto transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 dark:text-gray-400 text-sm">
            &copy; 2026 TradeSovereign. All rights reserved.
        </div>
    </footer>

    <!-- Logic -->
    <script>
        // Theme Setup
        const applyTheme = (theme) => {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('theme-icon').classList.replace('fa-sun', 'fa-moon');
            }
        };
        const toggleTheme = () => {
            const isDark = document.documentElement.classList.contains('dark');
            const newTheme = isDark ? 'light' : 'dark';
            localStorage.setItem('theme', newTheme);
            applyTheme(newTheme);
        };
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) applyTheme(savedTheme);
        else if (window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme('dark');

        // URL Parsing & Dynamic Injection
        const url = new URL(window.location.href);
        const classValue = url.searchParams.get('class') || '10';
        const subjectValue = url.searchParams.get('subject') || 'mathematics';
        
        document.getElementById('back-btn').href = `class.html?class=${classValue}`;

        // Format Subject String
        const labelSubject = subjectValue.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        document.getElementById('subject-title').innerHTML = `${labelSubject} <span class="text-gray-400 dark:text-gray-500 font-medium md:indent-2 block md:inline text-2xl md:text-5xl mt-2 md:mt-0">Class ${classValue}</span>`;

        // Dummy Data Structure extending further
        const chapterData = {
            'mathematics': ['Number Systems', 'Polynomials', 'Coordinate Geometry', 'Linear Equations', 'Introduction to Euclid Geometry', 'Lines and Angles', 'Triangles', 'Quadrilaterals', 'Areas of Parallelograms and Triangles', 'Circles', 'Constructions', 'Heron\'s Formula', 'Surface Areas and Volumes', 'Statistics', 'Probability'],
            'science': ['Matter in Our Surroundings', 'Is Matter Around Us Pure', 'Atoms and Molecules', 'Structure of the Atom', 'The Fundamental Unit of Life', 'Tissues', 'Diversity in Living Organisms', 'Motion', 'Force and Laws of Motion', 'Gravitation', 'Work and Energy', 'Sound', 'Why Do We Fall Ill', 'Natural Resources', 'Improvement in Food Resources'],
            // Fallback for others
        };

        const chapters = chapterData[subjectValue] || Array.from({length: 12}, (_, i) => `Chapter ${i+1}`);
        document.getElementById('chapter-count').innerText = `${chapters.length} Chapters`;
        const listEl = document.getElementById('chapter-list');

        chapters.forEach((chap, idx) => {
            const el = document.createElement('a');
            el.className = 'group flex items-center justify-between p-5 bg-white dark:bg-dark-surface rounded-xl border border-gray-200 dark:border-dark-border hover:border-brand-500 dark:hover:border-brand-500 hover:shadow-md transition-all';
            el.href = `chapter.html?class=${classValue}&subject=${subjectValue}&chapter=${idx+1}`;
            
            el.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 font-bold group-hover:bg-brand-50 dark:group-hover:bg-brand-900/30 group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors">
                        ${idx+1}
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900 dark:text-white group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors">${chap}</h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">Includes notes, videos, and quizzes.</p>
                    </div>
                </div>
                <div class="text-gray-400 group-hover:text-brand-500 group-hover:translate-x-1 transition-all">
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            `;
            listEl.appendChild(el);
        });
    </script>
</body>
</html>
