<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Tools | TradeSovereign LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gold: { DEFAULT: '#D4AF37' } } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0B0F19; color: #F3F4F6; }
        .glass-panel { background: rgba(31, 41, 55, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .gold-btn { background: linear-gradient(135deg, #D4AF37, #AA8C2C); color: #0B0F19; transition: transform 0.2s; }
        .gold-btn:hover { transform: translateY(-2px); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body class="antialiased h-screen flex flex-col overflow-hidden">

    <header class="glass-panel border-b border-gold-DEFAULT/20 px-6 h-16 flex items-center justify-between shrink-0">
        <a href="/" class="text-xl font-bold tracking-tight text-[#D4AF37] flex items-center gap-2">
            <i class="fas fa-crown"></i> TradeSovereign Toolkit
        </a>
        <nav class="hidden md:flex gap-8">
            <a href="/courses.html" class="text-gray-300 hover:text-white">Courses</a>
            <a href="/dashboard.html" class="text-gray-300 hover:text-white">Dashboard</a>
            <a href="/trading-tools.html" class="text-gold-DEFAULT font-medium">Simulator</a>
        </nav>
    </header>

    <main class="flex-grow flex flex-col md:flex-row gap-4 p-4 h-full">
        <!-- Main Chart Widget -->
        <div class="glass-panel flex-grow rounded-xl relative overflow-hidden h-full flex flex-col">
            <div class="p-3 border-b border-white/10 flex justify-between items-center bg-dark-900/50">
                <span class="font-bold text-sm"><i class="fas fa-chart-line text-gold-DEFAULT mr-2"></i> Advanced Chart Engine</span>
                <span class="text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded">Live Data</span>
            </div>
            <div class="flex-grow w-full border-none">
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:BTCUSD",
                "interval": "5",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "enable_publishing": false,
                "backgroundColor": "#0B0F19",
                "gridColor": "rgba(255, 255, 255, 0.05)",
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "container_id": "tv_widget"
                });
                </script>
                <div id="tv_widget" class="h-full w-full"></div>
            </div>
        </div>

        <!-- Simulator Order Panel -->
        <div class="w-full md:w-80 glass-panel rounded-xl flex flex-col h-full overflow-y-auto">
            <div class="p-4 border-b border-white/10 flex justify-between items-center sticky top-0 bg-dark-900/80 backdrop-blur-md">
                <h3 class="font-bold text-sm">Paper Trade</h3>
                <span class="text-sm font-mono text-gold-DEFAULT" id="simBalance">$10,000.00</span>
            </div>
            <div class="p-4 flex-grow flex flex-col gap-4">
                <div class="bg-black/30 p-3 rounded-lg text-center">
                    <div class="text-xs text-gray-400 mb-1">BTC/USD Market Price</div>
                    <div class="text-2xl font-mono text-green-400 font-bold" id="marketPrice">64,231.50</div>
                </div>
                
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Quantity (BTC)</label>
                    <input type="number" step="0.01" value="0.1" class="w-full bg-dark-900 border border-white/20 rounded px-3 py-2 text-white outline-none focus:border-gold-DEFAULT">
                </div>
                
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <button class="bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition" onclick="alert('Paper trade executed: Long 0.1 BTC!')">Buy / Long</button>
                    <button class="bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-lg transition" onclick="alert('Paper trade executed: Short 0.1 BTC!')">Sell / Short</button>
                </div>
                
                <div class="mt-8 border-t border-white/10 pt-4">
                    <h4 class="text-xs text-gray-400 mb-2 uppercase tracking-wide font-bold">Open Positions</h4>
                    <p class="text-sm text-gray-500 text-center py-4">No open positions.</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
