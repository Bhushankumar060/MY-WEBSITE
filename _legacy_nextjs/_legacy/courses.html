<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | TradeSovereign LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        gold: { light: '#FFE55C', DEFAULT: '#D4AF37', dark: '#AA8C2C' },
                        dark: { 900: '#0B0F19', 800: '#111827', 700: '#1F2937' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0B0F19; color: #F3F4F6; }
        .glass-panel { background: rgba(31, 41, 55, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .gold-gradient-text { background: linear-gradient(135deg, #FFE55C, #D4AF37, #AA8C2C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gold-btn { background: linear-gradient(135deg, #D4AF37, #AA8C2C); color: #0B0F19; transition: all 0.3s ease; }
        .gold-btn:hover { box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); transform: translateY(-2px); }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass-panel border-b border-gold-DEFAULT/20">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="/" class="text-xl md:text-2xl font-bold tracking-tight gold-gradient-text flex items-center gap-2">
                <i class="fas fa-crown"></i> TradeSovereign
            </a>
            <nav class="hidden md:flex gap-8">
                <a href="/courses.html" class="text-gold-DEFAULT font-medium">Courses</a>
                <a href="/dashboard.html" class="text-gray-300 hover:text-gold-DEFAULT transition font-medium auth-only" style="display:none;">Dashboard</a>
                <a href="/trading-tools.html" class="text-gray-300 hover:text-gold-DEFAULT transition font-medium">Trading Tools</a>
                <a href="/forum.html" class="text-gray-300 hover:text-gold-DEFAULT transition font-medium">Forum</a>
            </nav>
            <div class="flex items-center gap-4">
                <div class="guest-only">
                    <button onclick="document.getElementById('authModal').classList.remove('hidden')" class="gold-btn px-4 py-2 rounded-lg font-semibold text-sm">Login / Sign Up</button>
                </div>
                <div class="auth-only hidden flex items-center gap-4">
                    <span class="text-sm text-gray-400 user-name-display"></span>
                    <button class="logout-btn px-4 py-2 rounded-lg border border-red-500/50 text-red-500 hover:bg-red-500/10 text-sm font-semibold transition">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-6 py-12 w-full">
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-bold mb-4">Master Course <span class="gold-gradient-text">Library</span></h1>
            <p class="text-gray-400 text-lg max-w-2xl mx-auto">Browse premium academic materials and institutional trading courses. Unlock your potential today.</p>
        </div>

        <!-- Filters (Static for now) -->
        <div class="flex flex-wrap justify-center gap-4 mb-12">
            <button class="px-6 py-2 rounded-full glass-panel border-gold-DEFAULT text-gold-DEFAULT">All Categories</button>
            <button class="px-6 py-2 rounded-full glass-panel hover:border-gold-DEFAULT hover:text-gold-DEFAULT transition">Trading</button>
            <button class="px-6 py-2 rounded-full glass-panel hover:border-gold-DEFAULT hover:text-gold-DEFAULT transition">Academics</button>
        </div>

        <!-- Dynamic Course Grid -->
        <div id="courseGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20 text-gray-500">
                <i class="fas fa-spinner fa-spin text-3xl mb-4 text-gold-DEFAULT"></i>
                <p>Loading premium courses...</p>
            </div>
        </div>
    </main>

    <!-- Auth Modal -->
    <div id="authModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="glass-panel p-8 rounded-2xl w-full max-w-md relative">
            <button onclick="document.getElementById('authModal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
            
            <h2 class="text-2xl font-bold mb-6 text-center">Sign In</h2>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Email</label>
                    <input type="email" id="email" required class="w-full bg-dark-900 border border-white/20 rounded-lg px-4 py-2 text-white focus:border-gold-DEFAULT outline-none transition">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full bg-dark-900 border border-white/20 rounded-lg px-4 py-2 text-white focus:border-gold-DEFAULT outline-none transition">
                </div>
                <button type="submit" class="w-full gold-btn py-3 rounded-lg font-bold">Login securely</button>
            </form>

            <div class="mt-6 border-t border-white/10 pt-6">
                <h3 class="text-sm text-center text-gray-400 mb-4">Don't have an account? Register below.</h3>
                <form id="registerForm" class="space-y-4">
                    <div>
                        <input type="email" id="reg_email" placeholder="New Email" required class="w-full bg-dark-900 border border-white/20 rounded-lg px-4 py-2 text-white focus:border-gold-DEFAULT outline-none transition">
                    </div>
                    <div>
                        <input type="password" id="reg_password" placeholder="New Password" required class="w-full bg-dark-900 border border-white/20 rounded-lg px-4 py-2 text-white focus:border-gold-DEFAULT outline-none transition">
                    </div>
                    <button type="submit" class="w-full py-3 rounded-lg font-bold glass-panel hover:bg-white/10 transition text-white">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('courseGrid');
            try {
                const courses = await App.getCourses();
                grid.innerHTML = '';
                courses.forEach(c => {
                    grid.innerHTML += `
                        <div class="glass-panel rounded-2xl overflow-hidden hover:-translate-y-2 transition duration-300 flex flex-col">
                            <div class="h-48 bg-dark-900 relative">
                                <span class="absolute top-4 right-4 text-xs font-bold px-3 py-1 bg-black/50 backdrop-blur-md rounded-full text-gold-DEFAULT border border-gold-DEFAULT/30 uppercase">${c.category}</span>
                                <div class="w-full h-full flex items-center justify-center text-gray-700">
                                    <i class="fas fa-book-open text-5xl"></i>
                                </div>
                            </div>
                            <div class="p-6 flex-grow flex flex-col">
                                <h3 class="text-xl font-bold mb-2">${c.title}</h3>
                                <p class="text-gray-400 text-sm mb-6 flex-grow line-clamp-3">${c.description}</p>
                                <a href="course-viewer.html?id=${c._id}" class="w-full gold-btn text-center py-2 rounded-lg font-semibold block text-sm">View Curriculum <i class="fas fa-arrow-right ml-1"></i></a>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                grid.innerHTML = '<p class="text-red-500 col-span-full text-center">Failed to load courses. Is the backend running?</p>';
            }
        });
    </script>
</body>
</html>
