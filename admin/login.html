<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign SSO | Secure Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Outfit:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#10b981', dark: '#020617' },
                    fontFamily: { sans: ['Space Grotesk', 'sans-serif'], heading: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #020617; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 20px 20px; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; transform: translate3d(0, 0, 0); }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">
    <div id="login-container" class="glass-card w-full max-w-md p-10 rounded-3xl shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>
        
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-primary/20">
                <i class="fa-solid fa-shield-halved text-primary text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black font-heading tracking-tighter text-white uppercase mb-2">Executive SSO</h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-[0.3em]">Sovereign Platform v9.1</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Authorized Email</label>
                <input type="email" id="email" required class="w-full bg-dark border border-white/5 p-4 rounded-xl text-white font-bold outline-none focus:border-primary transition-all">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Vault Passphrase</label>
                <input type="password" id="password" required class="w-full bg-dark border border-white/5 p-4 rounded-xl text-white font-bold outline-none focus:border-primary transition-all">
            </div>
            
            <button type="submit" class="w-full bg-primary text-dark font-black uppercase tracking-widest py-4 rounded-xl hover:bg-emerald-400 transition-all flex items-center justify-center gap-3">
                <i class="fa-solid fa-lock-open mr-2"></i> Initiate Connection
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-white/5 flex items-center justify-center gap-4">
            <div class="flex items-center gap-2 px-3 py-1 bg-white/5 rounded-full border border-white/10">
                <span class="w-2 h-2 bg-primary rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Master Secure Link Active</span>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs (Compat Mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const container = document.getElementById('login-container');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                try {
                    await firebase.auth().signInWithEmailAndPassword(email, password);
                    window.location.href = '../admin.html';
                } catch (error) {
                    console.error("SSO_FAIL:", error);
                    container.classList.add('shake');
                    setTimeout(() => container.classList.remove('shake'), 500);
                }
            });
        });
    </script>
</body>
</html>
